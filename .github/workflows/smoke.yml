# Self-contained CI for socratink-tui. No sibling socratink-app checkout.
#
# Jobs:
# - prompt-templates: TUI prompt template unit tests (no API, no venv deps)
# - canon: vendored graph-truth drift gate + ported training tests + JS unit
#   suite (./scripts/run-js-unit-tests.sh; needs .venv via setup-tui-runtime)
# - scripted-loop: fake-LLM end-to-end SEDA session (no API key)

name: Smoke
env:
  NODE_VERSION: "22"
  PYTHON_VERSION_FILE: ".python-version"

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-typecheck:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - run: npm run version:check
      - name: Check PR loop version target
        if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main'
        run: |
          set -euo pipefail
          git fetch origin main
          MAIN_VERSION="$(
            git show origin/main:lib/loop-server/version.mjs \
              | grep -oE 'v0\.[0-9]{2}' \
              | head -1
          )"
          TARGET_VERSION="$(node scripts/bump-loop-version.mjs --next "$MAIN_VERSION")"
          CURRENT_VERSION="$(node scripts/bump-loop-version.mjs --print)"
          echo "main=${MAIN_VERSION} target=${TARGET_VERSION} current=${CURRENT_VERSION}"
          if [ "$CURRENT_VERSION" != "$TARGET_VERSION" ]; then
            echo "::error::LOOP_APP_VERSION should be ${TARGET_VERSION}. Run 'npm run bump:loop' locally and push the result."
            exit 1
          fi
      - run: npm run lint
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version-file: ${{ env.PYTHON_VERSION_FILE }}
      - run: python -m pip install --upgrade pip poetry
      - run: poetry install --no-root
      - run: poetry run pip install -r requirements.txt
      - run: poetry run mypy vendor/python
      - run: poetry run mypy bridge.py prompt_templates.py bridge_lib
      - run: poetry run mypy scripts

  prompt-templates:
    name: Prompt templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version-file: ${{ env.PYTHON_VERSION_FILE }}
      - run: python -m pip install --upgrade pip pytest
      - run: pytest tests/test_prompt_template.py -q

  canon:
    name: Canon drift + training tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-tui-runtime
      - name: Verify vendored canon matches committed checksums
        run: ./scripts/check-canon-drift.sh
      - run: python -m pip install --upgrade pip pytest
      - name: Ported training-store / training-derive tests
        run: pytest tests/test_training_store.py tests/test_training_derivation.py -q
      - name: JS preflight + self-contained unit tests
        run: ./scripts/run-js-unit-tests.sh

  scripted-loop:
    name: Scripted loop (fake LLM)
    runs-on: ubuntu-latest
    env:
      SOCRATINK_TUI_FAKE_LLM: "1"
      SOCRATINK_TUI_FAKE_COLD_CLASSIFICATION: shallow
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-tui-runtime
      - name: Scripted TUI smoke (shell)
        run: ./socratink-tui --scripted fixtures/source_less_script.json --color=never
      - name: Bridge registry + prompt eval gates
        run: |
          .venv/bin/pip install pytest
          .venv/bin/pytest \
            tests/test_bridge_registry.py \
            tests/test_bridge_post_call_hooks.py \
            tests/test_bridge_route_runtime.py \
            tests/test_prompt_eval_repair_dialogue.py \
            tests/test_prompt_eval_evaluator.py \
            tests/test_fake_repair_dialogue_golden.py \
            -q
      - name: Harness replay + routing proofs
        run: |
          ./socratink-harness replay
          ./socratink-harness routing-proof
      - name: Loop chat UI server-backed tests
        run: |
          SOCRATINK_TUI_ENV_FILE=.qa-runs/validation-entrypoints/missing.env \
          SOCRATINK_TUI_FAKE_LLM=1 \
          SOCRATINK_TUI_FAKE_COLD_CLASSIFICATION=shallow \
            node --no-warnings loop-server.mjs &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for _ in {1..30}; do
            if curl -fsS http://127.0.0.1:8787/health >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8787/health >/dev/null
          SOCRATINK_LOOP_BASE_URL=http://127.0.0.1:8787 node --test tests/js/loop-chat-ui.test.mjs
      - name: Workspace smoke + contract tests (pytest)
        run: .venv/bin/pytest tests/test_workspace_smoke.py tests/test_app_contract.py -q

  deploy-production:
    name: Verify production loop
    runs-on: ubuntu-latest
    needs: [lint-typecheck, prompt-templates, canon, scripted-loop]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
      RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SOCRATINK_FEEDBACK_WEBHOOK_URL: ${{ secrets.SOCRATINK_FEEDBACK_WEBHOOK_URL }}
      SOCRATINK_FEEDBACK_SECRET: ${{ secrets.SOCRATINK_FEEDBACK_SECRET }}
      SOCRATINK_FEEDBACK_TO: ${{ secrets.SOCRATINK_FEEDBACK_TO }}
      RAILWAY_LOOP_HEALTH_URL: ${{ vars.RAILWAY_LOOP_HEALTH_URL }}
      APP_LOOP_HEALTH_URL: https://app.socratink.ai/health
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Validate production deploy config
        run: |
          required=(
            RAILWAY_TOKEN
            RAILWAY_PROJECT_ID
            RAILWAY_ENVIRONMENT
            RAILWAY_SERVICE
            GEMINI_API_KEY
            RAILWAY_LOOP_HEALTH_URL
          )
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required GitHub secret/variable: $key" >&2
              exit 1
            fi
          done
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Sync Railway runtime variables
        run: |
          LOOP_EXPECTED_VERSION="$(node scripts/bump-loop-version.mjs --print)"
          echo "LOOP_EXPECTED_VERSION=$LOOP_EXPECTED_VERSION" >> "$GITHUB_ENV"
          railway variable set --skip-deploys \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "$RAILWAY_SERVICE" \
            "GEMINI_API_KEY=${GEMINI_API_KEY}" \
            "LLM_MODEL=gemini-2.5-flash"
          if [[ -n "${SOCRATINK_FEEDBACK_WEBHOOK_URL:-}" ]]; then
            railway variable set --skip-deploys --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_ENVIRONMENT" --service "$RAILWAY_SERVICE" \
              "SOCRATINK_FEEDBACK_WEBHOOK_URL=${SOCRATINK_FEEDBACK_WEBHOOK_URL}"
          fi
          if [[ -n "${SOCRATINK_FEEDBACK_SECRET:-}" ]]; then
            railway variable set --skip-deploys --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_ENVIRONMENT" --service "$RAILWAY_SERVICE" \
              "SOCRATINK_FEEDBACK_SECRET=${SOCRATINK_FEEDBACK_SECRET}"
          fi
          if [[ -n "${SOCRATINK_FEEDBACK_TO:-}" ]]; then
            railway variable set --skip-deploys --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_ENVIRONMENT" --service "$RAILWAY_SERVICE" \
              "SOCRATINK_FEEDBACK_TO=${SOCRATINK_FEEDBACK_TO}"
          fi
          # Stale LOOP_APP_VERSION overrides the baked-in constant without a restart.
          railway variable delete LOOP_APP_VERSION \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "$RAILWAY_SERVICE" \
            2>/dev/null || true
      - name: Redeploy loop from main with synced variables
        run: |
          railway redeploy --from-source --yes \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "$RAILWAY_SERVICE"
      - name: Verify Railway and app.socratink.ai are on the deployed version
        run: node scripts/verify-live-loop-version.mjs
