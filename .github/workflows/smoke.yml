# Self-contained CI for socratink-tui. No sibling socratink-app checkout.
#
# Jobs:
# - prompt-templates: TUI prompt template unit tests (no API, no venv deps)
# - canon: vendored graph-truth drift gate + ported training tests (Node)
# - scripted-loop: fake-LLM end-to-end SEDA session (no API key)

name: Smoke

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  prompt-templates:
    name: Prompt templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - run: python -m pip install --upgrade pip pytest
      - run: pytest tests/test_prompt_template.py -q

  canon:
    name: Canon drift + training tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - name: Verify vendored canon matches committed checksums
        run: ./scripts/check-canon-drift.sh
      - run: python -m pip install --upgrade pip pytest
      - name: Ported training-store / training-derive tests
        run: pytest tests/test_training_store.py tests/test_training_derivation.py -q
      - name: JS preflight + unit tests
        run: node --test 'tests/js/*.test.mjs'

  scripted-loop:
    name: Scripted loop (fake LLM)
    runs-on: ubuntu-latest
    env:
      SOCRATINK_TUI_FAKE_LLM: "1"
      SOCRATINK_TUI_FAKE_COLD_CLASSIFICATION: shallow
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - name: Bootstrap self-contained venv
        run: ./scripts/bootstrap-python.sh
      - name: Scripted TUI smoke (shell)
        run: ./socratink-tui --scripted fixtures/source_less_script.json --color=never
      - name: Bridge registry + prompt eval gates
        run: |
          .venv/bin/pip install pytest
          .venv/bin/pytest \
            tests/test_bridge_registry.py \
            tests/test_bridge_post_call_hooks.py \
            tests/test_bridge_route_runtime.py \
            tests/test_prompt_eval_repair_dialogue.py \
            tests/test_fake_repair_dialogue_golden.py \
            -q
      - name: Harness replay + routing proofs
        run: |
          ./socratink-harness replay
          ./socratink-harness routing-proof
      - name: Workspace smoke + contract tests (pytest)
        run: .venv/bin/pytest tests/test_workspace_smoke.py tests/test_app_contract.py -q
