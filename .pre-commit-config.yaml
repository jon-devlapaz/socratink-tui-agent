repos:
  - repo: local
    hooks:
      - id: eslint-lib
        name: eslint (lib/)
        entry: npm run lint
        language: system
        files: ^lib/
        pass_filenames: false
      - id: mypy-vendor-python
        name: mypy --strict (vendor/python/)
        entry: poetry run mypy vendor/python
        language: system
        files: ^vendor/python/.*\.py$
        pass_filenames: false
      - id: mypy-bridge-core
        name: mypy --strict (bridge runtime core)
        entry: poetry run mypy bridge.py prompt_templates.py bridge_lib
        language: system
        files: ^(bridge\.py|prompt_templates\.py|bridge_lib/.*\.py)$
        pass_filenames: false
      - id: mypy-scripts
        name: mypy --strict (scripts/)
        entry: poetry run mypy scripts
        language: system
        files: ^scripts/.*\.py$
        pass_filenames: false
